name: frigid_throughput_quality
objective: >
  Improve FRIGID training and inference throughput while preserving
  spectrum-to-molecule quality on MassSpecGym. Focus on single-GPU MSG base inference,
  ICEBERG scaling, and DLM training bottlenecks with measured scorer runs on
  the configured GPU host.
primary_metric: seconds_per_case
direction: minimize
runtime_target: ssh:kolmogorov
campaign_mode: campaign
continuation: goal_first
termination: >
  Stop when seconds_per_case improves on the scorer with quality guards
  passing, when the declared budget is exhausted, or when the same blocker
  repeats three times.
notes:
  - Heavy scorer runs must execute on one explicit remote GPU, not locally.
  - Optimize single-GPU throughput first; do not use multi-GPU sharding as the target path.
  - kolmogorov is the default runtime for scorer runs; use one free RTX 4090 via CUDA_VISIBLE_DEVICES.
  - Test metrics are guards for throughput work, not an everyday model-selection target.
  - Do not run scorer concurrently with a full FRIGID benchmark unless explicitly allowed.
