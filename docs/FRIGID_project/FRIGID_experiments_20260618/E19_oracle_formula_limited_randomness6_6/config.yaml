data:
  datadir: repro_cache/msg
  hf_cache_dir: /path/to/data/safes/
  labels_file: repro_cache/msg/labels.tsv
  spec_folder: repro_cache/msg/spec_files
  split_file: repro_cache/msg/split.tsv
  subform_folder: repro_cache/msg/subformulae/default_subformulae
dlm:
  checkpoint: repro_cache/DLM.ckpt
evaluation:
  max_spectra: null
  metrics:
  - accuracy
  - tanimoto
  split: test
fingerprint:
  bits: 4096
  radius: 2
  threshold: 0.25
formula_filter:
  max_attempts: 200
  n_required: 20
generation:
  batch_size: 16
  randomness: 6.0
  softmax_temp: 1.0
  top_k: 100
mist_encoder:
  checkpoint: repro_cache/mist_msg.pt
  cls_type: ms1
  embed_instrument: false
  form_embedder: pos-cos
  hidden_size: 640
  inten_prob: 0.1
  inten_transform: float
  magma_modulo: 2048
  max_peaks: null
  mol_features: fingerprint
  num_heads: 8
  output_size: 4096
  pairwise_featurization: true
  peak_attn_layers: 2
  refine_layers: 4
  remove_prob: 0.5
  set_pooling: cls
  spec_features: peakformula
  spectra_dropout: 0.1
  top_layers: 1
output:
  results_dir: repro_runs/20260618T_spectrum_msg_paper_repro/experiments/E19_oracle_formula_limited_randomness6_6
